#     2. Paste it at the bottom
#     3. Fill in the fields
#     4. Put the cover art at:  public/images/projects/{slug}.jpg
#     5. Rebuild the site (npm run build) or dev server auto-reloads
#
#  📋 FIELD REFERENCE:
#     slug        → URL-safe identifier — lowercase, no spaces
#     title       → Project title (Chinese/English)
#     artist      → Artist display name
#     cover       → Path to cover image starting with /images/projects/
#     type        → "Album", "Single", "EP", etc.
#     year        → Release year
#     releaseDate → Full date "YYYY-MM-DD" (leave "" if already out)
#     published   → true = visible on site, false = shows countdown timer
#     order       → Sort order (1 = first)
#     credits     → Full credits text (use | for multiline block)
#
# ═══════════════════════════════════════════════════

