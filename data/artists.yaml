#
#  ✏️  HOW TO ADD A NEW ARTIST:
#     1. Copy any block below (from "- slug:" to the last link)
#     2. Paste it at the bottom
#     3. Fill in the fields
#     4. Put the artist photo at:  public/images/artist/{slug}.jpg
#     5. Rebuild the site (npm run build) or dev server auto-reloads
#
#  📋 FIELD REFERENCE:
#     slug       → URL path (/artists/slug) — lowercase, no spaces
#     name       → Display name (Chinese/English)
#     tag        → Role label shown under name (e.g. "Producer · Artist")
#     photo      → Path to photo starting with /images/artists/
#     order      → Sort order (1 = first)
#     bio        → Short bio text (leave "" if empty)
#     links      → Social links (leave "" if not available)
#       instagram, appleMusic, spotify, website
#
# ═══════════════════════════════════════════════════

